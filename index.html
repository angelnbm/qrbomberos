<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#b00020" />
    <title>QR Medico Bomberos Teno</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <div class="badge">1a Compania Bomberos de Teno</div>
        <h1>Identificacion Medica</h1>
        <p class="subtitle">Escaneo rapido de QR offline</p>
      </header>

      <section class="scanner">
        <div id="reader" class="scanner__viewport" aria-label="Camara"></div>
        <div class="scanner__actions">
          <button id="startBtn" class="btn btn--primary" type="button">
            Iniciar camara
          </button>
          <button id="stopBtn" class="btn btn--ghost" type="button" disabled>
            Detener
          </button>
        </div>
        <p id="status" class="status" role="status">Listo para escanear.</p>
      </section>

      <section class="cards" aria-live="polite">
        <article class="card">
          <h2>Nombre</h2>
          <p id="cardName">-</p>
        </article>
        <article class="card">
          <h2>Grupo sanguineo</h2>
          <p id="cardBlood">-</p>
        </article>
        <article class="card">
          <h2>Alergias</h2>
          <p id="cardAllergy">-</p>
        </article>
        <article class="card">
          <h2>Contacto</h2>
          <p id="cardPhone">-</p>
        </article>
      </section>

      <section class="generator">
        <header class="generator__header">
          <h2>Generar QR</h2>
          <p>Completa los datos y crea el codigo para imprimir.</p>
        </header>
        <form id="qrForm" class="generator__form" autocomplete="off">
          <label class="field">
            <span>Nombre completo</span>
            <input id="inputName" type="text" required placeholder="Juan Perez" />
          </label>
          <label class="field">
            <span>Grupo sanguineo</span>
            <input id="inputBlood" type="text" required placeholder="O Positivo" />
          </label>
          <label class="field">
            <span>Alergias</span>
            <input
              id="inputAllergy"
              type="text"
              required
              placeholder="Penicilina, Ibuprofeno"
            />
          </label>
          <label class="field">
            <span>Telefono contacto</span>
            <input id="inputPhone" type="tel" required placeholder="+56912345678" />
          </label>
          <div class="generator__actions">
            <button id="generateBtn" class="btn btn--primary" type="button">
              Generar QR
            </button>
            <button id="clearBtn" class="btn btn--ghost" type="button">
              Limpiar
            </button>
          </div>
        </form>
        <div class="generator__output">
          <div id="qrOutput" class="qr-output" aria-label="Codigo QR"></div>
          <p id="qrPayload" class="qr-payload">-</p>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/html5-qrcode@2.3.10/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
